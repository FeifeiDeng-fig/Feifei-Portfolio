<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>006 / Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .page-label {
    position: fixed;
    top: 32px;
    left: 36px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    color: rgba(255,255,255,.35);
    z-index: 100;
  }

  .spacer {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spacer-hint {
    font-size: 13px;
    color: rgba(255,255,255,.2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: .25; }
    50% { opacity: .6; }
  }

  .card-section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8vw;
    gap: 6vw;
  }

  .text-block {
    flex: 1;
    max-width: 480px;
  }

  .text-location {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 500;
    margin-bottom: 16px;
    opacity: 0;
  }

  .text-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 4vw, 54px);
    color: #fff;
    line-height: 1.15;
    margin-bottom: 32px;
    opacity: 0;
  }

  .text-quote {
    font-size: 16px;
    color: #bbb;
    line-height: 1.75;
    font-weight: 300;
    font-style: italic;
    max-width: 400px;
    opacity: 0;
  }

  .text-quote::before {
    content: "\201C";
    display: block;
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    color: #b8f000;
    line-height: 1;
    margin-bottom: 8px;
    font-style: normal;
  }

  .image-block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    opacity: 0;
  }

  .blob-wrapper {
    position: relative;
    width: clamp(300px, 30vw, 460px);
    height: clamp(400px, 40vw, 600px);
  }

  .blob-bg {
    position: absolute;
    inset: -12px;
    background: #b8f000;
    clip-path: url(#blobClip);
    border-radius: 4px;
  }

  .blob-image {
    position: relative;
    width: 100%;
    height: 100%;
    clip-path: url(#blobClip);
    overflow: hidden;
  }

  .blob-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  svg.clip-svg {
    position: absolute;
    width: 0;
    height: 0;
  }

  @media (max-width: 768px) {
    .card-section {
      flex-direction: column-reverse;
      height: auto;
      min-height: 100vh;
      padding: 12vh 6vw;
      gap: 8vh;
    }
    .text-block { max-width: 100%; text-align: center; }
    .text-quote { max-width: 100%; }
    .text-quote::before { display: inline-block; }
    .blob-wrapper { width: 260px; height: 340px; }
  }
</style>
</head>
<body>

<svg class="clip-svg">
  <defs>
    <clipPath id="blobClip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.01 C0.75,0.01,0.95,0.08,0.98,0.25 C1.01,0.42,0.99,0.58,0.97,0.75 C0.94,0.92,0.78,0.99,0.5,0.99 C0.22,0.99,0.06,0.92,0.03,0.75 C0.01,0.58,-0.01,0.42,0.02,0.25 C0.05,0.08,0.25,0.01,0.5,0.01Z" />
    </clipPath>
  </defs>
</svg>

<div class="page-label">006 / Scroll</div>

<div class="spacer">
  <span class="spacer-hint">Scroll down</span>
</div>

<section class="card-section">
  <div class="text-block">
    <p class="text-location">Los Angeles</p>
    <h1 class="text-name">Vincent<br>Navarro</h1>
    <p class="text-quote">We met Vincent at Venice Beach's Skate Park, and his skate style caught our eyes.</p>
  </div>
  <div class="image-block">
    <div class="blob-wrapper">
      <div class="blob-bg"></div>
      <div class="blob-image">
        <img src="https://images.unsplash.com/photo-1547153760-18fc86324498?w=600" alt="Skateboarder in action">
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".card-section",
      start: "top 60%",
      toggleActions: "play none none reverse"
    }
  });

  tl.fromTo(".image-block",
    { opacity: 0, scale: 0.85 },
    { opacity: 1, scale: 1, duration: 1, ease: "power3.out" }
  )
  .fromTo([".text-location", ".text-name", ".text-quote"],
    { opacity: 0, y: 40 },
    { opacity: 1, y: 0, duration: 0.8, ease: "power2.out", stagger: 0.15 },
    0.2
  );
</script>
</body>
</html>
